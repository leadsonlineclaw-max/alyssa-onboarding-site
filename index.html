<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadsOnline — Onboarding Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <div id="login-screen" class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
          <h1>LeadsOnline</h1>
          <p class="login-subtitle">Onboarding Portal</p>
        </div>
        <div class="login-tabs">
          <button class="login-tab active" data-tab="newhire">New Hire</button>
          <button class="login-tab" data-tab="staff">Manager / HR</button>
        </div>
        <div id="newhire-login" class="login-form">
          <p class="login-hint">Paste your onboarding link or enter your token below.</p>
          <input type="text" id="token-input" placeholder="Enter your magic token..." class="input">
          <button onclick="App.loginWithToken()" class="btn btn-primary btn-full">Start Onboarding →</button>
        </div>
        <div id="staff-login" class="login-form" style="display:none">
          <input type="email" id="email-input" placeholder="Enter your email..." class="input">
          <button onclick="App.loginWithEmail()" class="btn btn-primary btn-full">Sign In →</button>
          <div class="login-hint" style="margin-top:12px">
            <strong>Demo accounts:</strong><br>
            HR: sarah.chen@leadsonline.com<br>
            Manager: mike.torres@leadsonline.com
          </div>
        </div>
        <div id="login-error" class="error-msg" style="display:none"></div>
      </div>
    </div>

    <div id="main-app" style="display:none">
      <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo"><i class="fas fa-shield-halved"></i></div>
          <span class="sidebar-brand">LeadsOnline</span>
          <button class="sidebar-close" onclick="App.toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-user">
          <div class="avatar" id="sidebar-avatar">AJ</div>
          <div class="sidebar-user-info">
            <div id="sidebar-name" class="sidebar-user-name"></div>
            <div id="sidebar-title" class="sidebar-user-title"></div>
          </div>
        </div>
        <ul class="sidebar-nav" id="sidebar-nav"></ul>
        <div class="sidebar-footer">
          <button onclick="App.logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
        </div>
      </nav>

      <main id="content" class="content">
        <header class="topbar">
          <button class="hamburger" onclick="App.toggleSidebar()"><i class="fas fa-bars"></i></button>
          <h2 id="page-title" class="topbar-title"></h2>
          <div class="topbar-right" id="topbar-right"></div>
        </header>
        <div id="page-content" class="page-content"></div>
      </main>
    </div>
  </div>

  <div id="confetti-container" class="confetti-container"></div>
  <div id="modal-overlay" class="modal-overlay" style="display:none" onclick="App.closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button onclick="App.closeModal()" class="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
